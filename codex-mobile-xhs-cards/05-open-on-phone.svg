  <text x="70" y="148" font-family="Arial, PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#188a54" letter-spacing="2">第 2 步</text>
  
  
    <text x="74" y="242" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="72" font-weight="900" fill="#111827" letter-spacing="0"><tspan x="74" dy="0">手机端打开</tspan><tspan x="74" dy="81.35999999999999">同一个 Codex 任务</tspan></text>
    <text x="74" y="398" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="500" fill="#52605a" letter-spacing="0"><tspan x="74" dy="0">离开电脑后，也能继续看这个线程的状态</tspan></text>
    
  <rect x="190" y="510" width="700" height="780" rx="70" fill="#101612"/>
  <rect x="205" y="525" width="670" height="750" rx="52.5" fill="#fbfcf9"/>
