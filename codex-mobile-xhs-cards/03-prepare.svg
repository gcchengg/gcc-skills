    <text x="74" y="242" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="72" font-weight="900" fill="#111827" letter-spacing="0"><tspan x="74" dy="0">先准备</tspan><tspan x="74" dy="81.35999999999999">这 3 件事</tspan></text>
    <text x="74" y="398" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="500" fill="#52605a" letter-spacing="0"><tspan x="74" dy="0">两端登录同一个账号，电脑端保持 Codex</tspan><tspan x="74" dy="48.28"> 正在运行</tspan></text>
    
    <rect x="80" y="558" width="920" height="118" rx="30" fill="#ffffff" stroke="#dde5dc" stroke-width="2"/>
    <circle cx="138" cy="617" r="28" fill="#188a54"/>
