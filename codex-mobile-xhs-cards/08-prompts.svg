<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <title>这样发指令 Codex 更容易执行</title>
  
  <rect width="1080" height="1440" rx="0" fill="#f7f8f4"/>
  <circle cx="960" cy="132" r="110" fill="#dcefe4" opacity=".75"/>
  <circle cx="110" cy="1260" r="150" fill="#e9eee9" opacity=".9"/>
  <path d="M0 1120 C220 1040 360 1190 560 1110 C760 1030 880 1090 1080 1010 L1080 1440 L0 1440 Z" fill="#eef2ec" opacity=".8"/>
  
  
  <rect x="70" y="64" width="178" height="38" rx="19" fill="#112018"/>
  <text x="159" y="89" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#e9fff0">08/09</text>
  <text x="70" y="148" font-family="Arial, PingFang SC, sans-serif" font-size="22" font-weight="800" fill="#188a54" letter-spacing="2">手机端指令模板</text>
  
  
    <text x="74" y="242" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="72" font-weight="900" fill="#111827" letter-spacing="0"><tspan x="74" dy="0">这样发指令</tspan><tspan x="74" dy="81.35999999999999">Codex 更容易执行</tspan></text>
    <text x="74" y="398" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="500" fill="#52605a" letter-spacing="0"><tspan x="74" dy="0">短、明确、有边界，比长篇描述更适合手机端</tspan></text>
    
  <rect x="88" y="540" width="900" height="86" rx="28" fill="#111827" stroke="#111827" stroke-width="2"/>
  <text x="122" y="598" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#ffffff" letter-spacing="0"><tspan x="122" dy="0">先总结你现在发现的问题。</tspan></text>
  
    
  <rect x="88" y="670" width="900" height="86" rx="28" fill="#ffffff" stroke="#dde5dc" stroke-width="2"/>
  <text x="122" y="728" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#1c2420" letter-spacing="0"><tspan x="122" dy="0">继续修，但不要扩大改动范围。</tspan></text>
  
    
  <rect x="88" y="800" width="900" height="86" rx="28" fill="#ffffff" stroke="#dde5dc" stroke-width="2"/>
  <text x="122" y="858" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#1c2420" letter-spacing="0"><tspan x="122" dy="0">测试失败的话，先定位原因。</tspan></text>
  
    
  <rect x="88" y="930" width="900" height="86" rx="28" fill="#ffffff" stroke="#dde5dc" stroke-width="2"/>
  <text x="122" y="988" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#1c2420" letter-spacing="0"><tspan x="122" dy="0">这个方案不对，换成更保守的实现。</tspan></text>
  
    
  <rect x="88" y="1060" width="900" height="120" rx="28" fill="#ffffff" stroke="#dde5dc" stroke-width="2"/>
  <text x="122" y="1118" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#1c2420" letter-spacing="0"><tspan x="122" dy="0">把当前进度整理成 5 条，我稍后回电</tspan><tspan x="122" dy="33.48">脑看。</tspan></text>
  
    
</svg>