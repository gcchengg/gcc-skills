    <text x="74" y="242" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="72" font-weight="900" fill="#111827" letter-spacing="0"><tspan x="74" dy="0">这 4 种情况</tspan><tspan x="74" dy="81.35999999999999">特别实用</tspan></text>
    <text x="74" y="398" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="500" fill="#52605a" letter-spacing="0"><tspan x="74" dy="0">它适合碎片时间接管，不适合在手机上硬写复杂</tspan><tspan x="74" dy="48.28">代码</tspan></text>
    
  <rect x="76" y="540" width="430" height="178" rx="30" fill="#ffffff" stroke="#dde5dc" stroke-width="2"/>
