  <text x="110" y="880" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="500" fill="#5d6762" letter-spacing="0"><tspan x="110" dy="0">远程批准下一步</tspan></text>
  
    
  <rect x="576" y="780" width="430" height="178" rx="30" fill="#ffffff" stroke="#dde5dc" stroke-width="2"/>
  <text x="610" y="838" font-family="PingFang SC, Arial, sans-serif" font-size="31" font-weight="800" fill="#111827">突然有想法</text>
  <text x="610" y="880" text-anchor="start" font-family="PingFang SC, Noto Sans CJK SC, Microsoft YaHei, Arial, sans-serif" font-size="24" font-weight="500" fill="#5d6762" letter-spacing="0"><tspan x="610" dy="0">马上补充新要求</tspan></text>
  
    
