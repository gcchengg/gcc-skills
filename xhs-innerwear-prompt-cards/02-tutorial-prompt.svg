<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7f1"/>
      <stop offset="100%" stop-color="#eee4dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#6d5650" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <rect x="74" y="70" width="932" height="1300" rx="32" fill="#fffaf6" filter="url(#shadow)"/>
  <rect x="106" y="104" width="868" height="1232" rx="24" fill="none" stroke="#dfd0c7" stroke-width="2"/>
  <text x="126" y="168" font-size="22" font-weight="800" letter-spacing="4" fill="#b18b80">AI ECOMMERCE PROMPT</text>
  <text x="126" y="262" font-size="60" font-weight="900" fill="#2d2523">穿戴教程图</text>
  <text x="126" y="318" font-size="30" fill="#7b6a64">让 AI 明确“这是教学图”</text>
  <line x1="126" y1="372" x2="954" y2="372" stroke="#dfd0c7" stroke-width="2"/>

  <rect x="126" y="420" width="828" height="112" rx="20" fill="#f4e8e4"/>
  <text x="158" y="464" font-size="26" font-weight="800" fill="#6b4540">核心提示词</text>
  <text x="158" y="504" font-size="25" fill="#2d2523">品牌官方教程图，四步骤分区，动作清楚</text>

  <rect x="126" y="578" width="390" height="118" rx="20" fill="#fff" stroke="#e0d2c8"/>
  <text x="158" y="624" font-size="28" font-weight="900" fill="#2d2523">STEP 1</text>
  <text x="158" y="664" font-size="24" fill="#685a55">前倾拨肉入杯</text>
  <rect x="564" y="578" width="390" height="118" rx="20" fill="#fff" stroke="#e0d2c8"/>
  <text x="596" y="624" font-size="28" font-weight="900" fill="#2d2523">STEP 2</text>
  <text x="596" y="664" font-size="24" fill="#685a55">扣好背扣，固定下围</text>
  <rect x="126" y="724" width="390" height="118" rx="20" fill="#fff" stroke="#e0d2c8"/>
  <text x="158" y="770" font-size="28" font-weight="900" fill="#2d2523">STEP 3</text>
  <text x="158" y="810" font-size="24" fill="#685a55">调整肩带松紧</text>
  <rect x="564" y="724" width="390" height="118" rx="20" fill="#fff" stroke="#e0d2c8"/>
  <text x="596" y="770" font-size="28" font-weight="900" fill="#2d2523">STEP 4</text>
  <text x="596" y="810" font-size="24" fill="#685a55">站直检查贴合</text>

  <rect x="126" y="896" width="828" height="230" rx="24" fill="#2d2523"/>
  <text x="160" y="948" font-size="26" font-weight="800" fill="#f5d8cf">可以这样写</text>
  <text x="160" y="1002" font-size="30" font-weight="800" fill="#ffffff">“生成一张竖版高端电商教程详情图，主题为</text>
  <text x="160" y="1048" font-size="30" font-weight="800" fill="#ffffff">正确穿戴 4 步法，同一模特演示四个穿戴动作，</text>
  <text x="160" y="1094" font-size="30" font-weight="800" fill="#ffffff">每步有编号、动作图和短说明，清晰专业。”</text>

  <text x="126" y="1198" font-size="30" font-weight="900" fill="#2d2523">不要只写“美女穿内衣”</text>
  <text x="126" y="1246" font-size="26" fill="#74645e">要写：教程图、步骤、动作、说明、品牌感。</text>
  <text x="928" y="1322" text-anchor="end" font-size="22" fill="#a7948e">02 / 04</text>
</svg>
