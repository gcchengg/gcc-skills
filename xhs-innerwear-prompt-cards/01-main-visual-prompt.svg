<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7f1"/>
      <stop offset="100%" stop-color="#eee4dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#6d5650" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <rect x="74" y="70" width="932" height="1300" rx="32" fill="#fffaf6" filter="url(#shadow)"/>
  <rect x="106" y="104" width="868" height="1232" rx="24" fill="none" stroke="#dfd0c7" stroke-width="2"/>
  <text x="126" y="168" font-size="22" font-weight="800" letter-spacing="4" fill="#b18b80">AI ECOMMERCE PROMPT</text>
  <text x="126" y="262" font-size="60" font-weight="900" fill="#2d2523">主视觉首图</text>
  <text x="126" y="318" font-size="30" fill="#7b6a64">用一句话先锁定“产品气质”</text>
  <line x1="126" y1="372" x2="954" y2="372" stroke="#dfd0c7" stroke-width="2"/>

  <rect x="126" y="420" width="828" height="106" rx="20" fill="#f4e8e4"/>
  <text x="158" y="464" font-size="26" font-weight="800" fill="#6b4540">核心提示词</text>
  <text x="158" y="502" font-size="25" fill="#2d2523">日系高级感电商详情页首图，真实商业摄影</text>

  <rect x="126" y="572" width="390" height="144" rx="22" fill="#fff" stroke="#e0d2c8"/>
  <text x="158" y="618" font-size="28" font-weight="800" fill="#2d2523">模特设定</text>
  <text x="158" y="660" font-size="24" fill="#685a55">成年亚洲女性</text>
  <text x="158" y="696" font-size="24" fill="#685a55">自然优雅，淡妆</text>

  <rect x="564" y="572" width="390" height="144" rx="22" fill="#fff" stroke="#e0d2c8"/>
  <text x="596" y="618" font-size="28" font-weight="800" fill="#2d2523">产品设定</text>
  <text x="596" y="660" font-size="24" fill="#685a55">豆沙粉蕾丝文胸</text>
  <text x="596" y="696" font-size="24" fill="#685a55">贴合、聚拢、稳定</text>

  <rect x="126" y="760" width="828" height="278" rx="24" fill="#2d2523"/>
  <text x="160" y="812" font-size="26" font-weight="800" fill="#f5d8cf">可以这样写</text>
  <text x="160" y="866" font-size="30" font-weight="800" fill="#ffffff">“生成一张竖版高端日系电商内衣详情页首图，</text>
  <text x="160" y="912" font-size="30" font-weight="800" fill="#ffffff">同一位成年亚洲女性模特，穿豆沙粉轻熟蕾丝</text>
  <text x="160" y="958" font-size="30" font-weight="800" fill="#ffffff">聚拢文胸，柔和自然光，干净留白，突出贴合、</text>
  <text x="160" y="1004" font-size="30" font-weight="800" fill="#ffffff">自然聚拢、稳定包裹和日常舒适感。”</text>

  <text x="126" y="1108" font-size="30" font-weight="900" fill="#2d2523">画面文字尽量少</text>
  <text x="126" y="1156" font-size="26" fill="#74645e">轻盈贴合｜自然聚拢｜稳定包裹｜柔软舒适</text>
  <rect x="126" y="1236" width="828" height="64" rx="18" fill="#f4e8e4"/>
  <text x="154" y="1278" font-size="24" font-weight="800" fill="#6b4540">关键：先写风格，再写人物，再写产品卖点。</text>
  <text x="928" y="1322" text-anchor="end" font-size="22" fill="#a7948e">01 / 04</text>
