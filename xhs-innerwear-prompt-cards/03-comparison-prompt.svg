<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf7f1"/>
      <stop offset="100%" stop-color="#eee4dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#6d5650" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1080" height="1440" fill="url(#bg)"/>
  <rect x="74" y="70" width="932" height="1300" rx="32" fill="#fffaf6" filter="url(#shadow)"/>
  <rect x="106" y="104" width="868" height="1232" rx="24" fill="none" stroke="#dfd0c7" stroke-width="2"/>
  <text x="126" y="168" font-size="22" font-weight="800" letter-spacing="4" fill="#b18b80">AI ECOMMERCE PROMPT</text>
  <text x="126" y="262" font-size="60" font-weight="900" fill="#2d2523">对比说明图</text>
  <text x="126" y="318" font-size="30" fill="#7b6a64">让 AI 做“错误 vs 正确”</text>
  <line x1="126" y1="372" x2="954" y2="372" stroke="#dfd0c7" stroke-width="2"/>

  <rect x="126" y="420" width="828" height="112" rx="20" fill="#f4e8e4"/>
  <text x="158" y="464" font-size="26" font-weight="800" fill="#6b4540">核心提示词</text>
  <text x="158" y="504" font-size="25" fill="#2d2523">左右对比结构，错误原因 + 正确效果</text>

  <rect x="126" y="582" width="390" height="88" rx="20" fill="#f7eeee" stroke="#dfd0c7"/>
  <text x="158" y="638" font-size="30" font-weight="900" fill="#8c514b">常见错误</text>
  <rect x="564" y="582" width="390" height="88" rx="20" fill="#eef5ef" stroke="#dfd0c7"/>
  <text x="596" y="638" font-size="30" font-weight="900" fill="#4f755f">正确效果</text>

  <text x="150" y="734" font-size="26" fill="#685a55">空杯、不服帖</text>
  <text x="588" y="734" font-size="26" fill="#685a55">包裹自然</text>
  <text x="150" y="792" font-size="26" fill="#685a55">肩带过松</text>
  <text x="588" y="792" font-size="26" fill="#685a55">承托稳定</text>
  <text x="150" y="850" font-size="26" fill="#685a55">下围上跑</text>
  <text x="588" y="850" font-size="26" fill="#685a55">位置平稳</text>

  <rect x="126" y="910" width="828" height="230" rx="24" fill="#2d2523"/>
  <text x="160" y="962" font-size="26" font-weight="800" fill="#f5d8cf">可以这样写</text>
  <text x="160" y="1016" font-size="30" font-weight="800" fill="#ffffff">“生成一张竖版高端电商对比说明图，左侧为</text>
  <text x="160" y="1062" font-size="30" font-weight="800" fill="#ffffff">常见错误，右侧为正确效果，对比罩杯、肩带、</text>
  <text x="160" y="1108" font-size="30" font-weight="800" fill="#ffffff">下围和胸型，标注直观但保持高级克制。”</text>

  <text x="126" y="1210" font-size="30" font-weight="900" fill="#2d2523">对比图最重要的是结构</text>
  <text x="126" y="1258" font-size="26" fill="#74645e">写清楚左右关系，AI 才不会生成杂乱拼贴。</text>
  <text x="928" y="1322" text-anchor="end" font-size="22" fill="#a7948e">03 / 04</text>
</svg>
